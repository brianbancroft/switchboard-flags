services:
  postgres:
    image: postgres:16-alpine
    container_name: switchboard-postgres
    environment:
      POSTGRES_DB: switchboard
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d switchboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - switchboard-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: switchboard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - switchboard-redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: switchboard-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/switchboard
      REDIS_URL: redis://redis:6379
      API_HOST: "0.0.0.0"
      API_PORT: "4000"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:4000}"
      BETTER_AUTH_TRUSTED_ORIGINS: "${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3000}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      AUTH_PASSWORD_ENABLED: "${AUTH_PASSWORD_ENABLED:-true}"
      AUTH_GITHUB_ENABLED: "${AUTH_GITHUB_ENABLED:-false}"
      AUTH_GITHUB_CLIENT_ID: "${AUTH_GITHUB_CLIENT_ID:-}"
      AUTH_GITHUB_CLIENT_SECRET: "${AUTH_GITHUB_CLIENT_SECRET:-}"
      AUTH_GOOGLE_ENABLED: "${AUTH_GOOGLE_ENABLED:-false}"
      AUTH_GOOGLE_CLIENT_ID: "${AUTH_GOOGLE_CLIENT_ID:-}"
      AUTH_GOOGLE_CLIENT_SECRET: "${AUTH_GOOGLE_CLIENT_SECRET:-}"
      AUTH_APPLE_ENABLED: "${AUTH_APPLE_ENABLED:-false}"
      AUTH_APPLE_CLIENT_ID: "${AUTH_APPLE_CLIENT_ID:-}"
      AUTH_APPLE_CLIENT_SECRET: "${AUTH_APPLE_CLIENT_SECRET:-}"
      AUTH_META_ENABLED: "${AUTH_META_ENABLED:-false}"
      AUTH_META_CLIENT_ID: "${AUTH_META_CLIENT_ID:-}"
      AUTH_META_CLIENT_SECRET: "${AUTH_META_CLIENT_SECRET:-}"
      AUTH_OIDC_ENABLED: "${AUTH_OIDC_ENABLED:-false}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:4000}"
    container_name: switchboard-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"

volumes:
  switchboard-postgres-data:
  switchboard-redis-data:
